<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>charAt Example</title>
  </head>

  <body>
    <script>
      "use strict";

      main();

      function main() {
        const value = prompt("Enter four digit value");
        let message;

        if (validDigits(value, 4)) {
          message = "Correct value provided";
        } else {
          message = "Incorrect value provided";
        }
        alert(message);

        document.writeln(`Instances of a in abac: ${findInstancesOfChar("abac", "a")}`)
      }

      function findInstancesOfChar(str, target) {
        let count = 0;

        for (const value of str) {
          if (value === target) {
            count++;
          }
        }

        return count;
      }

      function validDigits(data, expectedLength) {
        if (data.length !== expectedLength) {
          return false;
        } else {
          /* data.charAt() returns a string; */
          document.writeln(`typeof ${typeof(data.charAt(0))}`);
          for (let idx = 0; idx < data.length; idx++) {
            if (Number.isNaN(Number(data.charAt(idx)))) {
              return false;
            }
          }
          return true;
        }
      }
    </script>
  </body>
</html>
