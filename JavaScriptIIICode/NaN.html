<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>NaN example</title>
</head>

<body>
    <script>
        "use strict";
        main();

        function main() {
            let message = "";

            message += "First: NaN == NaN: " + (window.NaN === window.NaN) + "<br>";
            message += "Second: NaN == NaN: " + (Number.NaN === Number.NaN) + "<br>";
            message += "Third: NaN == NaN: " + (NaN == window) + "<br>";
            message += "Fourth: NaN === NaN: " + (NaN === NaN) + "<br><br>";
            message += "window.isNaN(NaN): " + window.isNaN(NaN) + "<br>";
            message += "Number.isNaN(NaN): " + Number.isNaN(NaN) + "<br>";
          
            message += "24 is a number: " + !isNaN(24) + "<br>";
            message += "-24 is a number: " + !isNaN(-24) + "<br>";
            message += `Number("24"): ${Number("+24")}<br>`;
            message += "\"+24\" is a number: " + !isNaN("+24") + "<br>";
            message += "\"-24\" is a number: " + !isNaN("-24") + "<br><br>";
            
            message += `Number("Mary"): ${Number('Mary')}<br>`;
            let name = "Mary Smith";
            message += name +  " is NaN: " + window.isNaN(name) + "<br>";
            message += name +  " is NaN: " + Number.isNaN(name) + "<br><br>";
            
            message += "Empty string to number: " + Number("") + "<br>";
            message += "Empty string is NaN: " + window.isNaN("") + "<br>";
            message += "Empty string is NaN: " + Number.isNaN("") + "<br><br>";
            
            message += "Number(\"24Hi\"): " + Number("24Hi") + "<br>";
            message += "\"24Hi\" is NaN: " + window.isNaN("24Hi") + "<br>";
            message += "\"24Hi\" is NaN: " + Number.isNaN("24Hi") + "<br><br>";
            
            message += "parseInt(\"Hi\"): " + parseInt("Hi") + "<br>";
            message += "parseInt(\"24Hi\"): " + parseInt("24Hi") + "<br>";
            message += "parseInt(\"H56i\"): " + parseInt("H56i") + "<br>";
            message += "parseFloat(\"55.78Hi\"): " + parseFloat("55.78inches");

            document.writeln(message);
        }
    </script>
</body>

</html>
