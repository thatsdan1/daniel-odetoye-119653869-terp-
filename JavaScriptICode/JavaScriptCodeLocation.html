<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>JavaScript Program Template</title>
</head>

<body>
    <script>
        "use strict";

        /* 
           Following code is outside of any function;
           where it is executed?
        */
        const value = 10;  
        document.writeln(`value is:  ${value}<br>`);

        function process() {
            const score = 80;
            document.writeln(`score is ${score}`);
        }

        /* Calling the function */
        process();
    </script>
</body>

</html>
