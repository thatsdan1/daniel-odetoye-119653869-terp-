<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Placing Order</title>
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>
    <div id="mainContainer">
        <header>
            <h1>Placing Order</h1>
        </header>
        <div class="form-container">
            <form action="processing/placingOrder.php" method="post">
                <label for="serialNumber">Item serial number</label>
                <input type="text" id="serialNumber" name="serialNumber" placeholder="umd-item-0000" required autofocus>
                <label>Credit card number</label>
                <input type="text" name="cc1" maxlength="4" required size="4" placeholder="0000">
                <input type="text" name="cc2" maxlength="4" required size="4" placeholder="0000">
                <input type="text" name="cc3" maxlength="4" required size="4" placeholder="0000">
                <input type="text" name="cc4" maxlength="4" required size="4" placeholder="0000">
                <label for="shipping">Shipping address</label>
                <input type="text" id="shipping" name="shipping" maxlength="80" required>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="example@terpmail.umd.edu">
                <div>
                    <input type="submit" value="Submit Order">
                    <input type="reset" value="Clear">
                </div>
            </form>
        </div>
        <footer>
            <div>
                <a href="index.shtml">&copy; Terp Store (Serving College Park Since 1991)</a>
            </div>
        </footer>
    </div>
</body>

</html>
