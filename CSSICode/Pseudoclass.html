<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Class/Id Selectors</title>
    <style>
        a:link {
            color: blue;
        }

        a:visited {
            color: white;
        }

        a:hover {
            color: red;
        }

        a:active {
            color: yellow;
        }

        span:hover {
            font-size: 4em;
        }

        footer:hover {
            color: red;
        }
    </style>
</head>

<body>
    <p>
        <span>Additional information available at</span><br>
        <a href="http://en.wikipedia.org/wiki/The_Road_Not_Taken_(poem)">The Road Not Taken</a>
    </p>

    <footer>
        UMCP
    </footer>
</body>

</html>
