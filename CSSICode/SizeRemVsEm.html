<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Width/Height</title>
    <style>
        html {
            font-size: 15px;
        }

        body {
            font-size: 1em; /* Try 2em */
        }
    </style>
</head>

<body>
    <p style="font-size: 1rem; background-color: red">
        Size 1rem<br>
    </p>

    <p style="font-size: 2rem; background-color: red">
        Size 2rem<br>
    </p>

    <p style="font-size: 1em; background-color: red">
        Size 1em<br>
    </p>

    <p style="font-size: 2em; background-color: red">
        Size 2em<br>
    </p>

    <p style="font-size: 2em; background-color: red">
        Size 2em<br>
        <strong style="font-size: 2em">Strong Element (2em)</strong><br>
         <strong style="font-size: 2rem">Strong Element (2rem)</strong>
    </p>

    <p style="font-size: 4em; background-color: red">
        Size 4em<br>
        <strong style="font-size: 2em">Strong Element (2em)</strong><br>
        <strong style="font-size: 2rem">Strong Element (2rem)</strong>
    </p>
</body>

</html>
