<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Class/Id Selectors</title>
    <style>
        /* Notice the period for the class selector */
        .myFirstStyle {
            color: blue;
            background-color: yellow;
        }

        .mySecondStyle {
            font-size: 3em;
        }

        /* Notice the # for the id selector */
        #lastParagraph {
            background-color: red;
        }
    </style>
</head>

<body>
    <p class="myFirstStyle">Relying on a class selector.</p>
    <p class="mySecondStyle">Relying on a second class selector.</p>
    <p class="mySecondStyle myFirstStyle">Combining class selector.</p>
    <p id="lastParagraph">Last paragraph.</p>
</body>

</html>
