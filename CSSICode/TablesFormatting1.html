<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>Class Id Selectors</title>
	<style>
		table {
			background-color: black;

			/* try commenting this out */
			/* try collapse */
			border-collapse: separate;
			
			/* try solid, dashed, groove, ridge, inset, outset */		
			border-style: dashed;
			
			border-color: red;
			border-width: .25em;
			
			/* try left, right */
			text-align: center;
		}

		th {
			background-color: #F5DEB3;
			padding: 8px;
		}

		td {
			background-color: white;
		}
	</style>
</head>

<body>
	<h1>Tables</h1>

	<h2>Schedule</h2>
	<table>
		<tr>
			<th>Week</th>
			<th>Reading</th>
			<th>Work</th>
		</tr>
		<tr>
			<td>1 </td>
			<td>Poem</td>
			<td>Report</td>
		</tr>
		<tr>
			<td>2 </td>
			<td>Paper</td>
			<td>Quiz</td>
		</tr>
	</table>
</body>

</html>
