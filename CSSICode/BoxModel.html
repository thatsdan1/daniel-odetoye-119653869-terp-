<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Box Model</title>

    <style>
        html {
            font-size: 20px; /* Used by rem below */
        }

        body {
            font-family: arial, sans-serif;
            background-color: silver;
            width: 15rem;
            height: 20rem;
            border-style: solid;
            border-color: green;
            border-width: 0.5em;
          
            /* Change to 0 em, 1 ... 6 em */
            margin: 0em;
            
            /* Change to 0 em, 1 ... 6 em */
            padding: 0em;

            /* Try
            padding-left: 5em;
            margin-left: 5em;
            */
        }

        p {
            border-style: double;
            border-color: red;
            border-width: 0.5em;
            background-color: yellow;

            /* Try 
               margin-top: 10em;
                padding-top: 5em;
            */
        }

        div {
            border-style: groove;
            border-color: purple;
            border-width: 0.5em;
            border-radius: 1em; /* Creates round corners */
        }
    </style>
</head>

<body>
    <p>
        First paragraph
    </p>

    <div>
        div area
    </div>
</body>

</html>
