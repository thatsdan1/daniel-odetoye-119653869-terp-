<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>Input/Output</title>
</head>

<body>
	<script>
		"use strict";

		document.writeln("<strong>" + "Bill Calculation System</strong><br />");

		let costPerCredit, numberOfCredits, tuitionCost;

		/* Reading values from the user */
		costPerCredit = window.prompt("<strong>Enter</strong> cost per credit:");
		numberOfCredits = prompt("Enter number of credits:", 15);
		if (costPerCredit === null || costPerCredit === "") {
			document.writeln("You did not provide a cost per credit value (assuming $50)<br>");
			costPerCredit = 50;
		}
		if (numberOfCredits === null) {
			document.writeln("You did not provide a number of credits value (assuming 2)<br>");
			numberOfCredits = 2;
		}

		/* Computing cost */
		tuitionCost = Number(costPerCredit) * Number(numberOfCredits);

		document.writeln("<strong>Tuition Cost: $</strong>" + tuitionCost);
	</script>
</body>

</html>
