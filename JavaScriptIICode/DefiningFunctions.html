<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>JS Example</title>
  </head>

  <body>
    <script>
      document.writeln("Before function declaration: " + product(3, 4) + "<br>");

      /* Example #1: Function declaration */
      function product(x, y) {
        return x * y;  // If you don't return a value; undefined will be return
      }
      document.writeln("Function declaration: " + product(3, 4) + "<br>");
      /* Adding property to function  */
      product.location = "College Park";
      document.writeln("Location: " + product.location);

      /* Example #2: Function expression (anonymous function) */
      let productTwo = function(x, y) {
        return x * y;
      };
      document.writeln("Function expression: " + productTwo(100, 200) + "<br>");

        /* Example #3: Arrow Function */
      let productThree = (x, y) => x * y;
      document.writeln("Arrow Function: " + productThree(7, 5) + "<br>");

      /* Example #4: Using Function constructor */
      /* We can create objects using new as in Java */
      let productFour = new Function("x", "y", "return x * y");
      document.writeln("Function constructor: " + productFour(2, 3) + "<br>");

      /* Example #5: Missing return statement */
      function notReturningValue(x, y) {
        let answer = x * y;  
        // We are missing return; undefined will be returned 
      }
      document.writeln("Missing return: " + notReturningValue(10, 5));

    </script>
  </body>
</html>
